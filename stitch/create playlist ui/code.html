<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Resonance - Create Playlist</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-container": "#00a780",
                        "primary-container": "#ff5959",
                        "surface-container-lowest": "#0f0e10",
                        "on-error": "#690005",
                        "on-primary": "#68000d",
                        "inverse-surface": "#e6e1e4",
                        "on-tertiary-fixed-variant": "#00513d",
                        "surface-dim": "#141315",
                        "background": "#141315",
                        "surface-container-high": "#2b292c",
                        "on-surface": "#e6e1e4",
                        "primary-fixed-dim": "#ffb3af",
                        "surface-tint": "#ffb3af",
                        "surface-bright": "#3a393b",
                        "surface": "#141315",
                        "inverse-on-surface": "#313032",
                        "surface-container": "#201f21",
                        "tertiary": "#5adcb2",
                        "inverse-primary": "#b6232b",
                        "on-primary-fixed-variant": "#930017",
                        "on-secondary-fixed-variant": "#454747",
                        "on-surface-variant": "#e2bebb",
                        "on-tertiary-container": "#003325",
                        "on-primary-container": "#60000b",
                        "tertiary-fixed": "#79f9cd",
                        "outline-variant": "#5a403f",
                        "surface-variant": "#363436",
                        "on-secondary-fixed": "#1a1c1c",
                        "secondary-fixed-dim": "#c6c6c7",
                        "on-secondary": "#2f3131",
                        "surface-container-highest": "#363436",
                        "primary-fixed": "#ffdad7",
                        "on-primary-fixed": "#410005",
                        "on-secondary-container": "#b4b5b5",
                        "error": "#ffb4ab",
                        "secondary": "#c6c6c7",
                        "on-tertiary-fixed": "#002117",
                        "on-error-container": "#ffdad6",
                        "surface-container-low": "#1c1b1d",
                        "secondary-container": "#454747",
                        "primary": "#ffb3af",
                        "secondary-fixed": "#e2e2e2",
                        "tertiary-fixed-dim": "#5adcb2",
                        "error-container": "#93000a",
                        "on-tertiary": "#003829",
                        "on-background": "#e6e1e4",
                        "outline": "#a98987"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit-xl": "64px",
                        "unit-lg": "32px",
                        "unit-md": "16px",
                        "container-max": "1440px",
                        "gutter": "24px",
                        "margin-mobile": "16px",
                        "margin-desktop": "40px",
                        "unit-sm": "8px",
                        "unit-xs": "4px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Inter"],
                        "body-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "headline-xl": ["Inter"],
                        "label-caps": ["Inter"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "headline-xl": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #1c1b1d;
            color: #e6e1e4;
        }
        .modal-overlay {
            background-color: rgba(28, 27, 29, 0.8);
            backdrop-filter: blur(8px);
        }
        
        /* Modal Animation */
        @keyframes modalEnter {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-modal-enter {
            animation: modalEnter 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Input styling overrides for specific design language */
        .resonance-input {
            background-color: #252426;
            border: 1px solid transparent;
            color: #e6e1e4;
            transition: all 0.2s ease;
        }
        .resonance-input:focus {
            border-color: #ffb3af;
            outline: none;
            box-shadow: 0 0 15px rgba(255, 179, 175, 0.1);
        }
        .resonance-input::placeholder {
            color: #5a403f;
        }
    </style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Blurred Background (Simulated Dashboard) -->
<div class="absolute inset-0 z-0 opacity-30 select-none pointer-events-none">
<div class="grid grid-cols-4 gap-unit-md p-margin-desktop h-full">
<div class="col-span-1 bg-surface-container rounded-lg h-full"></div>
<div class="col-span-3 flex flex-col gap-unit-xl">
<div class="h-64 bg-surface-container-high rounded-xl w-full"></div>
<div class="grid grid-cols-3 gap-unit-md">
<div class="h-48 bg-surface-container rounded-lg"></div>
<div class="h-48 bg-surface-container rounded-lg"></div>
<div class="h-48 bg-surface-container rounded-lg"></div>
</div>
</div>
</div>
</div>
<!-- Modal Overlay Container -->
<div class="fixed inset-0 z-50 flex items-center justify-center modal-overlay p-margin-mobile md:p-margin-desktop">
<!-- Modal Card -->
<div class="bg-surface-container-high border border-surface-variant rounded-[16px] w-full max-w-[540px] shadow-2xl relative animate-modal-enter flex flex-col overflow-hidden">
<!-- Close Button (Absolute) -->
<button aria-label="Close modal" class="absolute top-6 right-6 text-on-surface-variant hover:text-on-surface transition-colors duration-200 z-10">
<span class="material-symbols-outlined text-[24px]">close</span>
</button>
<!-- Header -->
<div class="pt-unit-lg px-unit-lg pb-unit-sm">
<h2 class="font-headline-lg text-headline-lg text-on-surface">Create Playlist</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-2">Curate your perfect sonic landscape.</p>
</div>
<!-- Form Body -->
<form class="flex flex-col gap-unit-lg p-unit-lg flex-grow">
<!-- Title Input -->
<div class="flex flex-col gap-unit-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="playlist-title">Playlist Title</label>
<input autocomplete="off" class="resonance-input rounded-lg px-4 py-3 font-body-lg text-body-lg w-full" id="playlist-title" placeholder="e.g., Deep Focus Vibes" type="text">
</div>
<!-- Description Input -->
<div class="flex flex-col gap-unit-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="playlist-desc">Description <span class="opacity-50 font-normal">(Optional)</span></label>
<textarea class="resonance-input rounded-lg px-4 py-3 font-body-sm text-body-sm w-full resize-none" id="playlist-desc" placeholder="What's the mood?" rows="3"></textarea>
</div>
<!-- Accent Color Picker -->
<div class="flex flex-col gap-unit-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Theme Accent</label>
<div class="flex items-center gap-4 mt-2">
<!-- Coral Red (Primary) -->
<button aria-label="Select Coral Red theme" class="w-10 h-10 rounded-full bg-primary-container ring-2 ring-offset-2 ring-offset-surface-container-high ring-primary transition-transform hover:scale-110 flex items-center justify-center relative group" type="button">
<span class="material-symbols-outlined text-on-primary-container text-[18px] opacity-100">check</span>
</button>
<!-- Emerald (Tertiary) -->
<button aria-label="Select Emerald theme" class="w-10 h-10 rounded-full bg-tertiary-container ring-0 ring-offset-2 ring-offset-surface-container-high ring-transparent hover:ring-tertiary transition-transform hover:scale-110 flex items-center justify-center group" type="button">
<span class="material-symbols-outlined text-on-tertiary-container text-[18px] opacity-0 group-hover:opacity-50 transition-opacity">check</span>
</button>
<!-- Monochrome -->
<button aria-label="Select Monochrome theme" class="w-10 h-10 rounded-full bg-surface-bright ring-0 ring-offset-2 ring-offset-surface-container-high ring-transparent hover:ring-surface-bright transition-transform hover:scale-110 flex items-center justify-center group" type="button">
<span class="material-symbols-outlined text-on-surface text-[18px] opacity-0 group-hover:opacity-50 transition-opacity">check</span>
</button>
</div>
</div>
</form>
<!-- Footer / Actions -->
<div class="bg-surface-container p-unit-lg border-t border-surface-variant mt-auto">
<button class="w-full bg-primary-container text-on-primary-container font-headline-md text-headline-md py-4 rounded-lg flex items-center justify-center gap-2 hover:bg-[#ff6b6b] transition-all duration-200 shadow-[0_0_20px_rgba(255,89,89,0.15)] hover:shadow-[0_0_30px_rgba(255,89,89,0.3)]" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_circle</span>
                    Create Playlist
                </button>
</div>
</div>
</div>
</body></html>
